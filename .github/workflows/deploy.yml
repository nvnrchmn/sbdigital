name: Deploy to DirectAdmin

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # Jika Anda menggunakan SSH Key, gunakan baris di bawah ini dan hapus baris password di atas
          # key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd laravel_core
            
            # Jika GitHub repo bersifat private, pastikan PAT token sudah di-set di origin URL
            git pull origin main
            
            # Install dependencies
            composer install --no-interaction --prefer-dist --optimize-autoloader
            
            # Run migrations
            php artisan migrate --force
            
            # Cache configurations for performance
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Restart queue worker (jika menggunakan queue daemon / supervisor)
            # php artisan queue:restart
